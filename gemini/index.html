<!DOCTYPE html>
<html>
<head>
    <title>Google Gemini</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css" integrity="sha384-wcIxkf4k558AjM3Yz3BBFQUbk/zgIYC2R0QpeeYb+TwlBVMrlgLqwRjRtGZiK7ww" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js" integrity="sha384-hIoBPJpTUs74ddyc4bFZSM1TVlQDA60VBbJS0oA934VSz82sBx1X7kSx2ATBDIyd" crossorigin="anonymous"></script>
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        ::selection { background: #c9e0ff; }
        body {
            font-family: 'Google Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f4f8;
            color: #1e2a3a;
            padding-top: 70px;
            padding-bottom: 140px;
        }
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 12px 15px;
            background: #f0f4f8;
            display: flex;
            align-items: center;
            z-index: 1000;
        }
        .gemini-btn {
            font-size: 24px;
            font-weight: 500;
            letter-spacing: -0.02em;
            background: transparent;
            border: none;
            color: #1a3b5d;
            cursor: pointer;
            margin-right: 20px;
            padding: 4px 0;
            font-family: 'Google Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .gemini-btn:hover {
            opacity: 0.8;
        }

        .chat-container {
            height: calc(100vh - 210px);
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }
        .msg-row {
            width: 100%;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .msg-row.user { align-items: flex-end; }
        .msg-bubble {
            max-width: 85%;
            background: #ffffff;
            border-radius: 20px;
            padding: 16px 18px;
            word-wrap: break-word;
            width: fit-content;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            border: 1px solid #e2eaf5;
        }
        .msg-bubble.user { 
            background: #d9e6f5;
            border: 1px solid #b9cfec;
        }
        .model-tag {
            background: transparent;
            color: #1e3b5c;
            border: 1px solid #b8cde0;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 14px;
            width: fit-content;
            margin-bottom: 6px;
            font-weight: 450;
        }
        .msg-text { font-size: 16px; line-height: 1.5; color: #102331; }
        .thinking-dot {
            width: 10px;
            height: 10px;
            background: #2c577c;
            border-radius: 50%;
            margin: 0 0 16px 0;
            animation: breathe 1.2s ease-in-out infinite;
        }
        @keyframes breathe {
            0% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.3); opacity: 1; }
            100% { transform: scale(1); opacity: 0.7; }
        }
        .welcome-message {
            text-align: center;
            padding: 40px 20px;
            color: #000000;
            font-size: 28px;
            font-weight: 350;
            margin: 120px auto auto auto;
            max-width: 700px;
            line-height: 1.4;
        }
        .bottom-section {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15px 20px;
            background: #f0f4f8;
            z-index: 1000;
        }
        .input-container {
            display: flex;
            align-items: flex-start;
            position: relative;
            max-width: 860px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            border: 1px solid #c7d6e8;
        }
        .input-box {
            flex: 1;
            min-height: 52px;
            max-height: 132px;
            padding: 14px 150px 14px 20px; /* 右侧留出足够空间给触发器和发送按钮 */
            border: none;
            resize: none;
            font-size: 16px;
            font-family: inherit;
            background: transparent;
            color: #001b36;
            line-height: 1.5;
            outline: none;
        }
        .model-picker-trigger {
            position: absolute;
            right: 60px;
            bottom: 10px;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px 4px 12px;
            border-radius: 32px;
            background: transparent;
            cursor: pointer;
            user-select: none;
            font-size: 16px;
            color: #1e3a5f;
            font-weight: 500;
            transition: background 0.1s;
            white-space: nowrap;
            z-index: 2;
        }
        .model-picker-trigger:hover {
            background: #e2e8f0;
        }
        .model-picker-trigger .arrow {
            width: 20px;
            height: 20px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="%232c3e5c" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>') no-repeat center/contain;
            transition: transform 0.2s;
            flex-shrink: 0;
        }
        .model-picker-dropdown {
            position: absolute;
            bottom: calc(100% + 8px);
            right: 0;
            width: 280px;
            background: #e9eef6;
            border-radius: 20px;
            padding: 8px 0 0 0;
            box-shadow: 0 8px 24px rgba(0,20,40,0.2);
            display: none;
            z-index: 1100;
        }
        .model-picker-dropdown.active {
            display: block;
        }
        .dropdown-header {
            padding: 8px 16px 4px;
            font-size: 14px;
            font-weight: 500;
            color: #3c5a7d;
            letter-spacing: 0.2px;
            /* 移除分隔线和多余间隙 */
        }
        .dropdown-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            cursor: pointer;
            transition: background 0.1s;
        }
        .dropdown-item:hover {
            background: #d8dde4;
        }
        .item-info {
            display: flex;
            flex-direction: column;
        }
        .item-title {
            font-weight: 500;
            font-size: 15px;
            color: #0b2b4a;
        }
        .item-desc {
            font-size: 12px;
            color: #4a5e7a;
            margin-top: 2px;
        }
        .check-mark {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #0b57d0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .check-mark svg {
            width: 14px;
            height: 14px;
            fill: white;
        }
        .send-button {
            position: absolute;
            right: 12px;
            bottom: 10px;
            border: none;
            border-radius: 50%;
            background: #f0f4f9;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.1s;
            z-index: 2;
        }
        .send-button:hover {
            background: #e2e8f0;
        }
        .send-button:disabled { background: #d0dae8; cursor: not-allowed; }
        .send-button svg { fill: #000000; width: 20px; height: 20px; }
        .footer {
            text-align: center;
            padding: 14px 15px 6px;
            font-size: 13px;
            color: #3d5879;
            max-width: 700px;
            margin: 0 auto;
        }
        html, body { height: 100%; overflow: hidden; margin: 0; }
        a { color: #1a5fb0; text-decoration: none; }
    </style>
</head>
<body>
    <div class="header">
        <button class="gemini-btn" id="geminiRefreshBtn">Gemini</button>
    </div>
    
    <div class="chat-container" id="chatContainer">
        <div class="welcome-message" id="welcomeMessage">认识 Gemini：你的私人 AI 助理</div>
    </div>
    
    <div class="bottom-section">
        <div class="input-container" id="inputContainer">
            <!-- 模型触发器现在通过CSS定位在右侧 -->
            <div class="model-picker-trigger" id="modelPickerTrigger">
                <span id="selectedModelLabel">快速</span>
                <span class="arrow"></span>
            </div>
            <!-- 下拉菜单 (向上展开) -->
            <div class="model-picker-dropdown" id="modelPickerDropdown">
                <div class="dropdown-header">Gemini 3</div>
                <div class="dropdown-item" data-model="gemini-3-flash-preview" data-label="快速">
                    <div class="item-info">
                        <span class="item-title">快速</span>
                        <span class="item-desc">快速回答</span>
                    </div>
                    <span class="check-mark" style="display: none;" id="checkFlash">
                        <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
                    </span>
                </div>
                <div class="dropdown-item" data-model="gemini-3.1-pro-preview" data-label="Pro">
                    <div class="item-info">
                        <span class="item-title">Pro</span>
                        <span class="item-desc">使用 3.1 Pro 处理高阶数学和代码任务</span>
                    </div>
                    <span class="check-mark" style="display: none;" id="checkPro">
                        <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
                    </span>
                </div>
            </div>

            <textarea class="input-box" id="inputBox" placeholder="问问 Gemini 3" rows="2"></textarea>
            <button class="send-button" id="sendButton">
                <svg viewBox="0 0 24 24"><path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.58L20 12l-8-8-8 8z"></path></svg>
            </button>
        </div>
        <div class="footer">须遵守《Google 条款》和《Google 隐私权政策》。Gemini 是一款 AI 工具，其回答未必正确无误。</div>
    </div>

    <script>
        (function() {
            marked.setOptions({ breaks: true, gfm: true });

            function renderMarkdownWithMath(text) {
                if (!window.katex) return marked.parse(text);
                let formulas = {}, idx = 0;
                text = text.replace(/\$\$([\s\S]*?)\$\$/g, (m, p) => {
                    try { let h = katex.renderToString(p, { displayMode: true, throwOnError: false }); let ph = `@@KATEX_${idx++}@@`; formulas[ph] = h; return ph; } catch { return m; }
                }).replace(/\\\[([\s\S]*?)\\\]/g, (m, p) => {
                    try { let h = katex.renderToString(p, { displayMode: true, throwOnError: false }); let ph = `@@KATEX_${idx++}@@`; formulas[ph] = h; return ph; } catch { return m; }
                }).replace(/\\\(([\s\S]*?)\\\)/g, (m, p) => {
                    try { let h = katex.renderToString(p, { displayMode: false, throwOnError: false }); let ph = `@@KATEX_${idx++}@@`; formulas[ph] = h; return ph; } catch { return m; }
                });
                let html = marked.parse(text);
                return html.replace(/@@KATEX_(\d+)@@/g, (match) => formulas[match] || match);
            }

            const MODEL_NAMES = {
                'gemini-3-flash-preview': 'Gemini 3 Flash Preview',
                'gemini-3.1-pro-preview': 'Gemini 3.1 Pro Preview'
            };
            
            const chatContainer = document.getElementById('chatContainer');
            const inputBox = document.getElementById('inputBox');
            const sendBtn = document.getElementById('sendButton');
            const welcome = document.getElementById('welcomeMessage');
            const geminiRefreshBtn = document.getElementById('geminiRefreshBtn');

            const pickerTrigger = document.getElementById('modelPickerTrigger');
            const dropdown = document.getElementById('modelPickerDropdown');
            const selectedLabelSpan = document.getElementById('selectedModelLabel');
            const checkFlash = document.getElementById('checkFlash');
            const checkPro = document.getElementById('checkPro');
            const flashItem = document.querySelector('.dropdown-item[data-model="gemini-3-flash-preview"]');
            const proItem = document.querySelector('.dropdown-item[data-model="gemini-3.1-pro-preview"]');

            let currentModelId = 'gemini-3-flash-preview';

            const MAX_TOKENS = 32768;
            function countTokens(text) {
                if (!text) return 0;
                let tokens = 0;
                for (let i = 0; i < text.length; i++) {
                    const code = text.charCodeAt(i);
                    if ((code >= 0x4E00 && code <= 0x9FFF) || (code >= 0x3400 && code <= 0x4DBF) || (code >= 0x20000 && code <= 0x2A6DF) || (code >= 0x3000 && code <= 0x303F) || (code >= 0xFF00 && code <= 0xFFEF)) {
                        tokens += 2;
                    } else {
                        tokens += 1;
                    }
                }
                return tokens;
            }

            let messages = [];
            function messagesToText() {
                return messages.map(msg => (msg.role === 'user' ? '用户: ' : 'AI: ') + msg.content).join('\n');
            }
            function trimMessagesIfNeeded(limit = MAX_TOKENS) {
                let total = messages.reduce((sum, msg) => sum + msg.tokens, 0);
                while (total > limit && messages.length >= 2) {
                    const removed1 = messages.shift();
                    const removed2 = messages.shift();
                    total -= (removed1.tokens + removed2.tokens);
                }
                while (total > limit && messages.length > 0) {
                    const removed = messages.shift();
                    total -= removed.tokens;
                }
            }

            let isThinking = false;
            let firstMessageSent = false;

            function updateSendButtonState() {
                sendBtn.disabled = isThinking || !inputBox.value.trim();
            }

            function createModelTag(modelId, elapsedSeconds = null) {
                if (modelId === 'gemini-3.1-pro-preview' && elapsedSeconds !== null) {
                    let div = document.createElement('div');
                    div.className = 'model-tag';
                    let minutes = Math.floor(elapsedSeconds / 60), seconds = elapsedSeconds % 60;
                    div.textContent = `Reasoned for ${minutes > 0 ? `${minutes}m ${seconds}s` : `${seconds}s`}`;
                    return div;
                }
                return null;
            }

            function updateDropdownSelection(modelId) {
                checkFlash.style.display = modelId === 'gemini-3-flash-preview' ? 'flex' : 'none';
                checkPro.style.display = modelId === 'gemini-3.1-pro-preview' ? 'flex' : 'none';
                selectedLabelSpan.textContent = modelId === 'gemini-3-flash-preview' ? '快速' : 'Pro';
            }

            pickerTrigger.addEventListener('click', (e) => {
                e.stopPropagation();
                dropdown.classList.toggle('active');
            });

            document.addEventListener('click', (e) => {
                if (!pickerTrigger.contains(e.target) && !dropdown.contains(e.target)) {
                    dropdown.classList.remove('active');
                }
            });

            flashItem.addEventListener('click', () => {
                currentModelId = 'gemini-3-flash-preview';
                updateDropdownSelection(currentModelId);
                dropdown.classList.remove('active');
            });
            proItem.addEventListener('click', () => {
                currentModelId = 'gemini-3.1-pro-preview';
                updateDropdownSelection(currentModelId);
                dropdown.classList.remove('active');
            });

            updateDropdownSelection(currentModelId);

            function addMessage(text, isUser = false) {
                if (isUser && !firstMessageSent) {
                    welcome.style.display = 'none';
                    firstMessageSent = true;
                }
                let row = document.createElement('div');
                row.className = `msg-row ${isUser ? 'user' : 'ai'}`;
                let bubble = document.createElement('div');
                bubble.className = `msg-bubble${isUser ? ' user' : ''}`;
                let msgText = document.createElement('div');
                msgText.className = 'msg-text';
                
                if (isUser) {
                    msgText.innerHTML = text.replace(/\n/g, '<br>');
                } else {
                    msgText.innerHTML = renderMarkdownWithMath(text);
                }
                
                bubble.appendChild(msgText);
                row.appendChild(bubble);
                chatContainer.appendChild(row);
                chatContainer.scrollTop = chatContainer.scrollHeight;
                return msgText;
            }

            async function send() {
                if (isThinking) return;
                let text = inputBox.value.trim();
                if (!text) return;

                inputBox.value = '';
                inputBox.style.height = '';
                addMessage(text, true);

                trimMessagesIfNeeded(MAX_TOKENS);

                isThinking = true;
                updateSendButtonState();

                let thinkingRow = document.createElement('div');
                thinkingRow.className = 'msg-row ai';
                thinkingRow.innerHTML = '<div class="thinking-dot"></div>';
                chatContainer.appendChild(thinkingRow);
                chatContainer.scrollTop = chatContainer.scrollHeight;

                let opts = { 
                    stream: true, 
                    model: currentModelId,
                    tools: [{ type: 'web_search' }]
                };
                if (currentModelId.includes('gemini-')) opts.driver = 'openrouter';

                const startTime = Date.now();
                let firstChunkReceived = false;
                let bubbleRow = null;
                let msgText = null;
                let full = '';

                try {
                    let history = messagesToText();
                    let prompt = history ? history + '\n' : '';
                    prompt += '用户: ' + text + '\nAI: ';

                    let res = await puter.ai.chat(prompt, opts);
                    
                    for await (let part of res) {
                        if (!firstChunkReceived) {
                            thinkingRow.remove();
                            thinkingRow = null;

                            let row = document.createElement('div');
                            row.className = 'msg-row ai';
                            let bubble = document.createElement('div');
                            bubble.className = 'msg-bubble';
                            msgText = document.createElement('div');
                            msgText.className = 'msg-text';
                            bubble.appendChild(msgText);
                            row.appendChild(bubble);
                            chatContainer.appendChild(row);
                            bubbleRow = row;
                            firstChunkReceived = true;
                        }

                        if (part?.text) {
                            full += part.text;
                            msgText.innerHTML = renderMarkdownWithMath(full);
                            chatContainer.scrollTop = chatContainer.scrollHeight;
                        }
                    }

                    if (!firstChunkReceived) {
                        if (thinkingRow) thinkingRow.remove();
                        addMessage('模型返回了空响应', false);
                    } else {
                        const userTokens = countTokens(text);
                        const assistantTokens = countTokens(full);
                        messages.push({ role: 'user', content: text, tokens: userTokens });
                        messages.push({ role: 'assistant', content: full, tokens: assistantTokens });
                        trimMessagesIfNeeded(MAX_TOKENS);

                        let elapsed = Math.floor((Date.now() - startTime) / 1000);
                        let tag = createModelTag(currentModelId, elapsed);
                        if (tag) {
                            bubbleRow.insertBefore(tag, bubbleRow.firstChild);
                        }
                    }

                } catch (err) {
                    if (thinkingRow) thinkingRow.remove();
                    addMessage('错误: ' + err.message, false);
                } finally {
                    isThinking = false;
                    updateSendButtonState();
                    inputBox.focus();
                }
            }

            inputBox.addEventListener('input', () => {
                inputBox.style.height = 'auto';
                inputBox.style.height = Math.min(inputBox.scrollHeight, 132) + 'px';
                updateSendButtonState();
            });
            inputBox.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey && !isThinking && !/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                    e.preventDefault();
                    send();
                }
            });
            sendBtn.addEventListener('click', send);
            geminiRefreshBtn.addEventListener('click', () => location.reload());

            updateSendButtonState();
            inputBox.focus();

            document.addEventListener('gesturestart', (e) => e.preventDefault());
            document.addEventListener('touchmove', (e) => {
                if (e.touches.length > 1) e.preventDefault();
            }, { passive: false });
            document.addEventListener('gesturechange', (e) => e.preventDefault());
            document.addEventListener('gestureend', (e) => e.preventDefault());
        })();
    </script>
</body>
</html>
