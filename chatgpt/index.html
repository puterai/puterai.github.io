<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>ChatGPT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="/lib/katex/katex.min.css">
    <script src="/lib/katex/katex.min.js"></script>
    <script src="https://js.puter.com/v2/"></script>
    <script src="/lib/marked.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="/lib/markdown.css">
</head>
<body>
    <div class="header">
        <button class="new-chat-btn" id="newChatBtn">
            <img src="icon.png" width="20" height="20" alt="new">
        </button>
        <div class="auth-container" id="authContainer">
            <button class="login-btn" id="loginBtn" style="display: none;">Log in</button>
        </div>
    </div>
    <div class="chat-container" id="chatContainer">
        <div class="welcome-message" id="welcomeMessage"></div>
    </div>
    <div class="bottom-section">
        <button class="web-search-toggle" id="webSearchToggle">🌐 搜索</button>
        <div class="input-container" id="inputContainer">
            <textarea class="input-box" id="inputBox" placeholder="有问题，尽管问" rows="2"></textarea>
            <div class="model-picker-trigger" id="modelPickerTrigger">
                <span id="selectedModelLabel" style="color:#000;">5.5</span>
                <span id="selectedIntensityLabel" style="color:#777; margin-left:4px;">中</span>
                <span class="arrow"></span>
            </div>
            <div class="model-picker-dropdown" id="modelPickerDropdown">
                <div class="dropdown-section">
                    <div class="dropdown-header">模型</div>
                    <div class="dropdown-item model-item selected" data-model="5.5">5.5</div>
                    <div class="dropdown-item model-item" data-model="5.6 Sol">5.6 Sol</div>
                    <div class="dropdown-item model-item" data-model="5.6 Terra">5.6 Terra</div>
                    <div class="dropdown-item model-item" data-model="5.6 Luna">5.6 Luna</div>
                    <div class="dropdown-item model-item" data-model="5.4">5.4</div>
                    <div class="dropdown-item model-item" data-model="5.4 Mini">5.4 Mini</div>
                </div>
                <div class="dropdown-section">
                    <div class="dropdown-header">推理强度</div>
                    <div class="dropdown-item intensity-item selected" data-intensity="mid">中</div>
                    <div class="dropdown-item intensity-item" data-intensity="high">高</div>
                </div>
            </div>
            <button class="send-button" id="sendButton">
                <svg viewBox="0 0 24 24"><path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.58L20 12l-8-8-8 8z"></path></svg>
            </button>
        </div>
        <div class="footer">ChatGPT 也可能会犯错。请核查重要信息。查看 Cookie 首选项。</div>
    </div>
    <script src="app.js"></script>
</body>
</html>
