<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free AI Collections</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        ::selection {
            background: #b8ddff;
            color: #0a0c1e;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(145deg, #0a0c1e 0%, #1a1f35 100%);
            color: #eef3fc;
            line-height: 1.5;
            position: relative;
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.9;
        }

        .top-spacer, .bottom-spacer {
            flex: 1;
            pointer-events: none;
            z-index: 1;
            position: relative;
        }

        .content {
            flex-shrink: 0;
            text-align: center;
            padding: 1rem 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        h1 {
            font-size: clamp(2.2rem, 10vw, 4.5rem);
            font-weight: 700;
            margin-bottom: 0.4rem;
            background: linear-gradient(135deg, #ffffff, #b0c8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
            line-height: 1.1;
            text-shadow: 0 0 20px rgba(90, 160, 255, 0.5);
            animation: fadeUp 0.7s ease-out;
        }

        h1::after {
            content: '';
            display: block;
            width: 70px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #5b9aff, #a0c8ff, #5b9aff, transparent);
            margin: 0.5rem auto 0;
            border-radius: 2px;
            opacity: 0.8;
            box-shadow: 0 0 15px #3f7eff;
        }

        .subtitle {
            font-size: clamp(0.9rem, 3.5vw, 1.2rem);
            max-width: 650px;
            margin-bottom: 2rem;
            color: #cfdcff;
            font-weight: 400;
            text-shadow: 0 2px 10px rgba(0, 40, 100, 0.7);
            animation: fadeUp 0.7s ease-out 0.1s both;
        }

        .button-group {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
            animation: fadeUp 0.7s ease-out 0.2s both;
            position: relative;
            z-index: 5;
            width: 100%;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.8rem 2.2rem;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 500;
            text-decoration: none;
            color: #ffffff;
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(110, 180, 255, 0.5);
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s ease, box-shadow 0.3s ease, background-color 0.2s, border-color 0.2s;
            cursor: pointer;
            text-align: center;
            letter-spacing: 0.3px;
            box-shadow: inset 0 1px 3px rgba(255,255,255,0.3), 0 10px 22px -8px rgba(0,0,0,0.5), 0 0 15px rgba(70, 140, 255, 0.4);
            background-color: rgba(20, 30, 50, 0.4);
            position: relative;
            z-index: 5;
            gap: 8px;
            width: 100%;
            min-width: 0;
            white-space: nowrap;
        }

        .btn svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            transition: filter 0.2s ease;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }

        .btn[href*="chatgpt"] {
            border-color: rgba(255, 255, 255, 0.7);
            box-shadow: inset 0 1px 3px rgba(255,255,255,0.4), 0 10px 22px -8px #000, 0 0 20px rgba(255, 255, 255, 0.4);
            background-color: rgba(50, 55, 70, 0.3);
        }
        .btn[href*="gemini"] {
            border-color: rgba(150, 200, 255, 0.85);
            box-shadow: inset 0 1px 3px rgba(255,255,255,0.4), 0 10px 22px -8px #000, 0 0 20px rgba(80, 170, 255, 0.5);
            background-color: rgba(40, 65, 110, 0.4);
        }
        .btn[href*="claude"] {
            border-color: rgba(230, 160, 120, 0.7);
            box-shadow: inset 0 1px 3px rgba(255,225,200,0.4), 0 10px 22px -8px #000, 0 0 20px rgba(255, 140, 60, 0.3);
        }
        .btn[href*="grok"] {
            border-color: rgba(180, 180, 220, 0.7);
            background-color: rgba(30, 30, 45, 0.6);
            box-shadow: inset 0 1px 3px rgba(220,220,255,0.3), 0 10px 22px -8px #000, 0 0 20px rgba(160, 160, 255, 0.3);
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.02);
        }

        .btn:hover svg {
            filter: drop-shadow(0 0 8px currentColor);
        }

        .btn[href*="chatgpt"]:hover {
            border-color: rgba(255, 255, 255, 1);
            box-shadow: inset 0 1px 4px white, 0 15px 28px -10px #ffffff, 0 0 30px rgba(255, 255, 255, 0.8);
            background-color: rgba(255, 255, 255, 0.15);
        }
        .btn[href*="gemini"]:hover {
            border-color: #c8e2ff;
            box-shadow: inset 0 1px 4px white, 0 15px 28px -10px #7ab0ff, 0 0 30px #8ab8ff;
            background-color: rgba(90, 160, 250, 0.25);
        }
        .btn[href*="claude"]:hover {
            border-color: #fcd2b0;
            box-shadow: inset 0 1px 4px #ffdec6, 0 15px 28px -10px #d97c3a, 0 0 30px #ffa75e;
            background-color: rgba(210, 130, 80, 0.3);
        }
        .btn[href*="grok"]:hover {
            border-color: #d8d8ff;
            box-shadow: inset 0 1px 4px #efefff, 0 15px 28px -10px #a28eff, 0 0 30px #bdb0ff;
            background-color: rgba(140, 120, 210, 0.3);
        }

        .btn:active {
            transform: translateY(-1px);
            transition: transform 0.05s;
        }

        .btn:focus-visible {
            outline: 2px solid #5b9aff;
            outline-offset: 4px;
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 550px) {
            .content {
                padding: 0.5rem 1rem 1rem;
            }
            .button-group {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }
            .btn {
                padding: 0.7rem 1.5rem;
                font-size: 1.1rem;
            }
            h1 {
                font-size: clamp(2rem, 9vw, 3.5rem);
            }
        }

        @media (max-width: 380px) {
            .btn {
                white-space: normal;
                padding: 0.6rem 0.8rem;
            }
        }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>

    <div class="top-spacer" aria-hidden="true"></div>

    <div class="content">
        <h1>Free AI Collections</h1>
        <p class="subtitle">You can use major AI models for free but with limitations <span style="white-space: nowrap;">(no login required).</span></p>

        <div class="button-group">
            <a href="./chatgpt" class="btn">
                <svg fill="white" fill-rule="evenodd" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <title>ChatGPT</title>

                </svg>
                ChatGPT
            </a>
            <a href="./gemini" class="btn">
                <svg fill="white" fill-rule="evenodd" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <title>Gemini</title>

                </svg>
                Gemini
            </a>
            <a href="./claude" class="btn">
                <svg fill="white" fill-rule="evenodd" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <title>Claude</title>
                    <path d="M13.827 3.52h3.603L24 20h-3.603l-6.57-16.48zm-7.258 0h3.767L16.906 20h-3.674l-1.343-3.461H5.017l-1.344 3.46H0L6.57 3.522zm4.132 9.959L8.453 7.687 6.205 13.48H10.7z"></path>

            <a href="./grok" class="btn">
                <svg fill="white" fill-rule="evenodd" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <title>Grok</title>
                    <path d="M9.27 15.29l7.978-5.897c.391-.29.95-.177 1.137.272.98 2.369.542 5.215-1.41 7.169-1.951 1.954-4.667 2.382-7.149 1.406l-2.711 1.257c3.889 2.661 8.611 2.003 11.562-.953 2.341-2.344 3.066-5.539 2.388-8.42l.006.007c-.983-4.232.242-5.924 2.75-9.383.06-.082.12-.164.179-.248l-3.301 3.305v-.01L9.267 15.292M7.623 16.723c-2.792-2.67-2.31-6.801.071-9.184 1.761-1.763 4.647-2.483 7.166-1.425l2.705-1.25a7.808 7.808 0 00-1.829-1A8.975 8.975 0 005.984 5.83c-2.533 2.536-3.33 6.436-1.962 9.764 1.022 2.487-.653 4.246-2.34 6.022-.599.63-1.199 1.259-1.682 1.925l7.62-6.815"></path>
                </svg>
                Grok
            </a>
        </div>
    </div>

    <div class="bottom-spacer" aria-hidden="true"></div>

    <script>
        (function() {
            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');
            
            let width, height;
            let particles = [];
            const PARTICLE_COUNT = 120;
            const MAX_DIST = 150;
            const MOUSE_RADIUS = 120;
            let mouseX = -1000, mouseY = -1000;
            let mouseActive = false;

            function initParticles() {
                particles = [];
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    particles.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        vx: (Math.random() - 0.5) * 0.4,
                        vy: (Math.random() - 0.5) * 0.4,
                    });
                }
            }

            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                initParticles();
            }

            function updateParticles() {
                for (let p of particles) {
                    if (mouseActive) {
                        const dx = p.x - mouseX;
                        const dy = p.y - mouseY;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < MOUSE_RADIUS) {
                            const angle = Math.atan2(dy, dx);
                            const force = (1 - dist / MOUSE_RADIUS) * 0.3;
                            p.x += Math.cos(angle) * force * 2;
                            p.y += Math.sin(angle) * force * 2;
                            p.vx += (Math.random() - 0.5) * 0.05;
                            p.vy += (Math.random() - 0.5) * 0.05;
                        }
                    }

                    p.x += p.vx;
                    p.y += p.vy;

                    if (p.x < 0) { p.x = 0; p.vx *= -0.5; }
                    if (p.x > width) { p.x = width; p.vx *= -0.5; }
                    if (p.y < 0) { p.y = 0; p.vy *= -0.5; }
                    if (p.y > height) { p.y = height; p.vy *= -0.5; }

                    p.vx += (Math.random() - 0.5) * 0.02;
                    p.vy += (Math.random() - 0.5) * 0.02;

                    p.vx = Math.min(Math.max(p.vx, -1.2), 1.2);
                    p.vy = Math.min(Math.max(p.vy, -1.2), 1.2);
                }
            }

            function draw() {
                ctx.clearRect(0, 0, width, height);

                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < MAX_DIST) {
                            const opacity = (1 - dist / MAX_DIST) * 0.35;
                            ctx.strokeStyle = `rgba(80, 170, 255, ${opacity})`;
                            ctx.lineWidth = 1.2;
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.stroke();
                        }
                    }
                }

                for (let p of particles) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 2.2, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(210, 235, 255, 0.9)';
                    ctx.shadowColor = '#6ab0ff';
                    ctx.shadowBlur = 10;
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 1, 0, Math.PI * 2);
                    ctx.fillStyle = 'white';
                    ctx.shadowBlur = 15;
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
            }

            function animate() {
                updateParticles();
                draw();
                requestAnimationFrame(animate);
            }

            function onMouseMove(e) {
                mouseX = e.clientX;
                mouseY = e.clientY;
                mouseActive = true;
            }
            function onMouseLeave() {
                mouseActive = false;
            }
            function onTouchMove(e) {
                if (e.touches.length > 0) {
                    mouseX = e.touches[0].clientX;
                    mouseY = e.touches[0].clientY;
                    mouseActive = true;
                }
            }
            function onTouchEnd() {
                mouseActive = false;
            }

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseleave', onMouseLeave);
            document.addEventListener('touchmove', onTouchMove);
            document.addEventListener('touchend', onTouchEnd);
            document.addEventListener('touchcancel', onTouchEnd);

            window.addEventListener('resize', () => {
                resizeCanvas();
            });

            resizeCanvas();
            animate();
        })();
    </script>
</body>
</html>
